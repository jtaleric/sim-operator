---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-scale-openshift-io-v1-scaleloadconfig
  failurePolicy: Fail
  name: vscaleloadconfig.kb.io
  rules:
  - apiGroups:
    - scale.openshift.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - scaleloadconfigs
  sideEffects: None
