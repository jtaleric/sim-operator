apiVersion: scale.openshift.io/v1
kind: ScaleLoadConfig
metadata:
  name: realistic-workloads
spec:
  enabled: true
  
  # Target KWOK nodes specifically
  kwokNodeSelector:
    type: "kwok"
  
  # Realistic large-scale deployment profile
  loadProfile:
    profile: "production"
    namespacesPerNode: "0.3"  # ~300 namespaces for 1000 nodes (realistic for multi-tenant)
    resourcesPerNamespace: 8  # Mix of app resources per namespace
    # Moderate API rate - realistic for large cluster with active workloads
    apiCallRatePerNode: 25   # API calls per minute per node (25k total)
  
  # Namespace configuration - simulating different teams/applications
  namespaceConfig:
    namespacePrefix: "app-workload-"
    labels:
      scale.openshift.io/load-test: "true"
      environment: "production"
      workload-type: "application"
    annotations:
      scale.openshift.io/description: "Simulated application workload namespace"
  
  # Realistic node annotation patterns (infrastructure automation)
  annotationChurn:
    enabled: true
    networkingAnnotations: false  # Avoid KWOK networking issues
    machineConfigAnnotations: true  # Node lifecycle management
    updateIntervalMin: 600   # 10 minutes minimum (realistic for node management)
    updateIntervalMax: 1800  # 30 minutes maximum
  
  # Application workload resource patterns
  resourceChurn:
    # ConfigMaps - application config, environment variables, scripts
    configMaps:
      enabled: true
      count: 3  # Multiple configs per app (env vars, scripts, config files)
      updateFrequencyMin: 900   # 15 minutes (config updates)
      updateFrequencyMax: 3600  # 1 hour
      deleteRecreateChance: "0.05"  # Occasional config rebuilds
    
    # Secrets - credentials, certificates, API keys
    secrets:
      enabled: true
      count: 2  # App secrets + TLS certs
      updateFrequencyMin: 1800  # 30 minutes (cert rotations, credential updates)
      updateFrequencyMax: 7200  # 2 hours
      deleteRecreateChance: "0.02"  # Rare secret recreation
    
    # Routes - application ingress (realistic for microservices)
    routes:
      enabled: true
      count: 2  # Primary route + admin/health route
      updateFrequencyMin: 1800  # 30 minutes (route config changes)
      updateFrequencyMax: 5400  # 90 minutes
      deleteRecreateChance: "0.03"  # Occasional route changes
    
    # ImageStreams - container image metadata (CI/CD patterns)
    imageStreams:
      enabled: true
      count: 1  # One per application
      updateFrequencyMin: 3600  # 1 hour (new image builds/deployments)
      updateFrequencyMax: 10800 # 3 hours
      deleteRecreateChance: "0.01"  # Rare imagestream changes
    
    # BuildConfigs - CI/CD build definitions
    buildConfigs:
      enabled: true
      count: 1  # One build per app
      updateFrequencyMin: 7200  # 2 hours (build config updates)
      updateFrequencyMax: 21600 # 6 hours
      deleteRecreateChance: "0.01"  # Rare build config changes
    
    # Events - realistic application and infrastructure events
    events:
      enabled: true
      eventsPerNodePerHour: 30  # Moderate event generation (pod scaling, warnings, etc.)
      eventTypes:
      # Normal application lifecycle events
      - type: "Normal"
        reason: "Scheduled"
        message: "Successfully assigned pod %s to node"
        weight: 25
      - type: "Normal"
        reason: "Started"
        message: "Started container %s"
        weight: 20
      - type: "Normal"
        reason: "Pulled"
        message: "Container image pulled successfully"
        weight: 18
      - type: "Normal"
        reason: "Created"
        message: "Created container %s"
        weight: 15
      # Scaling and deployment events
      - type: "Normal"
        reason: "ScalingReplicaSet"
        message: "Scaled up replica set %s to %d"
        weight: 8
      - type: "Normal"
        reason: "SuccessfulCreate"
        message: "Created pod %s"
        weight: 6
      # Warning events (realistic failure rates)
      - type: "Warning"
        reason: "BackOff"
        message: "Back-off restarting failed container"
        weight: 4
      - type: "Warning"
        reason: "FailedMount"
        message: "Unable to attach or mount volumes"
        weight: 2
      - type: "Warning"
        reason: "FailedScheduling"
        message: "pod has unbound immediate PersistentVolumeClaims"
        weight: 2
  
  # Efficient cleanup for production simulation
  cleanupConfig:
    enabled: true
    gracefulDeletes: true
    cleanupDelaySeconds: 30  # Quick cleanup
    orphanCleanup: true